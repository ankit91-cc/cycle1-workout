<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cycle 1">
<title>Cycle 1 — Strength Build</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--surf:#1a1a1a;--surf2:#222;--surf3:#2a2a2a;
  --border:#2e2e2e;--border2:#3a3a3a;
  --accent:#e8a020;--accent-dim:#7a4800;
  --blue:#5b9bd5;--purple:#a78bfa;--green:#4ade80;--red:#f87171;--teal:#34d399;
  --txt:#f0f0f0;--txt2:#aaa;--txt3:#666;--txt4:#444;
  --check:26px;--radius:12px;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;font-size:15px;min-height:100vh;padding-bottom:80px;overscroll-behavior:none}

/* ── Header ── */
#header{background:var(--surf);padding:12px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.h-cycle{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:600}
.h-phase{font-size:11px;color:var(--txt3)}
.week-nav{display:flex;align-items:center;gap:8px}
.nav-btn{background:var(--surf2);border:1px solid var(--border2);color:var(--txt);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation}
.nav-btn:disabled{opacity:.25}
.nav-btn:active{background:var(--surf3)}
.week-info{flex:1;text-align:center}
.week-label{font-size:18px;font-weight:700;letter-spacing:-.3px}
.week-sub{font-size:11px;color:var(--txt2);margin-top:1px}
.week-dots{display:flex;justify-content:center;gap:5px;margin-top:8px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .2s}
.dot.active{background:var(--accent);transform:scale(1.3)}
.dot.done{background:var(--green)}
.dot.transition{background:var(--purple)}

/* ── Tabs ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;cursor:pointer;color:var(--txt3);background:none;border:none;font-size:10px;text-transform:uppercase;letter-spacing:.08em;gap:3px;touch-action:manipulation}
.tab.active{color:var(--accent)}
.tab-icon{font-size:20px}

/* ── Tab views ── */
.view{display:none;padding:12px 12px 0}
.view.active{display:block}
#view-history{display:none;padding:12px}
#view-history.active{display:block}
#view-recovery{display:none;padding:12px}
#view-recovery.active{display:block}

/* ── Week goals banner ── */
.goals-banner{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.goals-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:8px;font-weight:600}
.goals-text{font-size:13px;color:var(--txt2);line-height:1.55;margin-bottom:6px}
.goals-text:last-child{margin-bottom:0}
.weights-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.w-badge{background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.w-lift{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2)}
.w-val{font-size:22px;font-weight:800;color:var(--accent);line-height:1.1;margin-top:2px}
.w-unit{font-size:10px;color:var(--txt3)}

/* ── Session card ── */
.session-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.session-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;touch-action:manipulation;user-select:none}
.session-head:active{background:var(--surf2)}
.sh-left{}
.sh-day{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);margin-bottom:3px}
.sh-title{font-size:16px;font-weight:700;line-height:1.2}
.sh-sub{font-size:12px;color:var(--txt2);margin-top:2px}
.sh-badge{display:inline-block;background:#1e1200;border:1px solid var(--accent-dim);color:var(--accent);font-size:10px;padding:2px 7px;border-radius:20px;margin-top:4px;font-weight:600;letter-spacing:.05em}
.sh-badge.redo{background:#1a1025;border-color:#5b2f8c;color:var(--purple)}
.sh-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.sh-pct{font-size:12px;color:var(--txt2)}
.sh-chevron{color:var(--txt4);font-size:20px;transition:transform .2s}
.session-card.open .sh-chevron{transform:rotate(180deg)}
.prog-bar{height:3px;background:var(--border)}
.prog-fill{height:100%;background:var(--accent);transition:width .3s}
.prog-fill.full{background:var(--green)}

/* ── Session body ── */
.session-body{display:none;padding:0 14px 14px}
.session-card.open .session-body{display:block}

.date-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.date-lbl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;font-weight:500}
.date-inp{background:var(--surf2);border:1px solid var(--border2);color:var(--txt);border-radius:8px;padding:7px 10px;font-size:14px;flex:1;min-width:0}
.date-inp:focus{outline:none;border-color:var(--accent)}

/* ── Sections ── */
.section{margin-bottom:14px}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-top:2px;font-weight:600}
.sec-title.warmup{color:var(--txt2)}
.sec-title.lift{color:var(--blue)}
.sec-title.finisher{color:var(--purple)}
.sec-title.cooldown{color:var(--teal)}
.sec-title.mobility{color:var(--teal)}
.sec-title.core{color:var(--purple)}
.sec-title.check{color:var(--green)}
.sec-note{font-size:12px;color:var(--txt2);background:var(--surf2);border-left:2px solid var(--border2);padding:7px 10px;border-radius:0 8px 8px 0;margin-bottom:8px;line-height:1.5;font-style:italic}
.sec-note.accent{border-color:var(--accent);color:var(--txt2)}
.sec-note.personal{border-color:var(--purple);color:var(--purple);background:#160f22;font-style:normal}

/* ── Check items ── */
.ci{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid #1c1c1c;cursor:pointer;touch-action:manipulation;user-select:none;min-height:44px}
.ci:last-child{border-bottom:none}
.ci.done .ci-text{color:var(--txt4);text-decoration:line-through}
.ci-box{width:var(--check);height:var(--check);min-width:var(--check);border-radius:7px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:1px;transition:all .15s;flex-shrink:0}
.ci.done .ci-box{background:var(--green);border-color:var(--green);color:#000}
.ci-body{flex:1}
.ci-text{line-height:1.45;font-size:14px}
.ci-note{font-size:12px;color:var(--txt3);margin-top:3px;line-height:1.4;font-style:italic}

/* Sub-labels within sections (non-checkable) */
.sub-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);padding:8px 0 4px;border-top:1px solid #1a1a1a;margin-top:4px;font-weight:600}
.sub-label:first-child{border-top:none;margin-top:0}

/* ── History ── */
.hist-empty{text-align:center;padding:60px 20px;color:var(--txt3)}
.hist-empty-icon{font-size:40px;margin-bottom:12px}
.hist-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.hist-date{font-size:11px;color:var(--txt3);margin-bottom:3px}
.hist-title{font-size:15px;font-weight:700;margin-bottom:3px}
.hist-sub{font-size:13px;color:var(--txt2);margin-bottom:8px}
.hist-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.hist-fill{height:100%;background:var(--green);border-radius:2px}
.hist-stat{font-size:12px;color:var(--txt2);margin-top:4px}
.hist-clear-btn{background:none;border:1px solid var(--border2);color:var(--txt3);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;display:block;margin:0 auto 16px;touch-action:manipulation}
.hist-clear-btn:active{background:var(--surf2)}

/* ── Recovery Guide ── */
.rec-section{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.rec-h{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.rec-block{margin-bottom:12px}
.rec-block-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2);font-weight:600;margin-bottom:8px}
.rec-rule{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a;align-items:flex-start}
.rec-rule:last-child{border-bottom:none}
.rec-bullet{color:var(--accent);font-weight:700;flex-shrink:0;font-size:14px;margin-top:1px}
.rec-rule-text{font-size:14px;color:var(--txt);line-height:1.5}
.rec-outcome{background:#0d1a0d;border:1px solid #1f4d1f;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:13px;color:var(--green);font-weight:500;line-height:1.4}
.rec-important{background:#1a1100;border:1px solid var(--accent-dim);border-radius:10px;padding:14px;margin-bottom:12px}
.rec-imp-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:8px}
.rec-imp-text{font-size:14px;line-height:1.6;color:var(--txt)}
.rec-imp-text li{margin-left:16px;margin-bottom:4px;color:var(--txt2)}
.rec-imp-text li:last-child{margin-bottom:0}

/* ── Misc ── */
.divider{height:1px;background:var(--border);margin:8px 0}

/* ── Weight Editor Badges ── */
.w-badge.editable{cursor:pointer;position:relative}
.w-badge.editable:active{opacity:.7;transform:scale(.97)}
.w-edit-hint{font-size:9px;color:var(--txt4);margin-top:1px}
.w-badge.custom-wt .w-val{color:var(--teal)}
.w-badge.custom-wt{border-color:#1f4d3a}

/* ── Set Notes (per item) ── */
.set-note-area{padding:2px 0 8px 38px;border-bottom:1px solid #1c1c1c}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.set-tag{font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2);background:var(--surf2);color:var(--txt3);cursor:pointer;touch-action:manipulation}
.set-tag.easy{background:#0d1f0d;border-color:#2d5a2d;color:#4ade80}
.set-tag.good{background:#0d1525;border-color:#1e3d5c;color:#5b9bd5}
.set-tag.tough{background:#1f1400;border-color:#5c3d00;color:#e8a020}
.set-tag.failed{background:#1f0d0d;border-color:#5c1f1f;color:#f87171}
.set-tag.sel{border-width:2px;font-weight:700}
.set-note-txt{background:var(--surf2);border:1px solid var(--border2);color:var(--txt);border-radius:6px;padding:5px 9px;font-size:12px;width:100%;margin-top:4px;font-family:inherit}
.set-note-txt:focus{outline:none;border-color:var(--accent)}
.ci-tag-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;margin-top:3px;font-weight:600}
.ci-tag-badge.easy{background:#0d1f0d;color:#4ade80}
.ci-tag-badge.good{background:#0d1525;color:#5b9bd5}
.ci-tag-badge.tough{background:#1f1400;color:#e8a020}
.ci-tag-badge.failed{background:#1f0d0d;color:#f87171}
.ci-expand-note{color:var(--txt4);font-size:12px;margin-left:4px;cursor:pointer;touch-action:manipulation}

/* ── Plate Calculator Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--surf);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:440px;max-height:82vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.plate-input-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.plate-input-row label{font-size:13px;color:var(--txt2);flex-shrink:0;width:100px}
.plate-num-input{background:var(--surf2);border:1px solid var(--border2);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:20px;font-weight:700;flex:1;text-align:center;-moz-appearance:textfield}
.plate-num-input:focus{outline:none;border-color:var(--accent)}
.plate-num-input::-webkit-outer-spin-button,.plate-num-input::-webkit-inner-spin-button{-webkit-appearance:none}
.plate-result{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.plate-result-title{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;font-weight:600}
.plates-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
.plate-side-label{font-size:11px;color:var(--txt3);width:100%;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.plate-chip{padding:5px 10px;border-radius:8px;font-size:14px;font-weight:700}
.plate-chip.p45{background:#1a1000;border:1px solid #6b3500;color:#e8a020}
.plate-chip.p35{background:#0d1525;border:1px solid #1e3d5c;color:#5b9bd5}
.plate-chip.p25{background:#0f1f0d;border:1px solid #2d5a2d;color:#4ade80}
.plate-chip.p10{background:#1a0d1f;border:1px solid #4a2060;color:#a78bfa}
.plate-chip.p5{background:#1a1515;border:1px solid #5c2f2f;color:#f87171}
.plate-chip.p2{background:#181818;border:1px solid #3a3a3a;color:#aaa}
.plate-total-bar{font-size:13px;color:var(--txt2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
.plate-calc-btn{background:var(--surf2);border:1px solid var(--border2);border-radius:7px;padding:4px 8px;font-size:12px;cursor:pointer;color:var(--accent);touch-action:manipulation;display:inline-flex;align-items:center;gap:3px;flex-shrink:0;margin-left:6px}
.plate-calc-btn:active{opacity:.7}
.modal-close-row{margin-top:14px;text-align:center}
.modal-close-row button{background:var(--surf2);border:1px solid var(--border2);color:var(--txt2);border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer}

/* ── Rest Timer ── */
.rest-timer{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom,0px));left:0;right:0;background:var(--surf);border-top:1px solid var(--border);padding:9px 14px 9px 16px;z-index:150;display:none;align-items:center;gap:10px}
.rest-timer.visible{display:flex}
.rt-left{flex-shrink:0}
.rt-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}
.rt-time{font-size:26px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.rt-time.done{color:var(--green)}
.rt-presets{display:flex;gap:5px}
.rt-preset{background:var(--surf2);border:1px solid var(--border2);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--txt2);cursor:pointer;touch-action:manipulation}
.rt-preset.sel{border-color:var(--accent);color:var(--accent)}
.rt-preset:active{opacity:.7}
.rt-btn{background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;touch-action:manipulation;flex-shrink:0}
.rt-btn:active{opacity:.7}
.rt-close{color:var(--txt3);font-size:18px;cursor:pointer;padding:0 2px;touch-action:manipulation;flex-shrink:0}

/* ── Today Banner ── */
.today-banner{background:linear-gradient(135deg,#1a1000,#1f1500);border:1px solid var(--accent-dim);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;touch-action:manipulation;user-select:none}
.today-banner:active{opacity:.8}
.today-icon{font-size:22px;flex-shrink:0}
.today-text{}
.today-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:600}
.today-session{font-size:14px;font-weight:700;margin-top:2px;color:var(--txt)}
.today-arrow{color:var(--txt3);font-size:18px;margin-left:auto;flex-shrink:0}

/* ── Session Note ── */
.session-note-wrap{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.session-note-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);margin-bottom:6px;font-weight:600}
.session-note-input{background:var(--surf2);border:1px solid var(--border2);color:var(--txt);border-radius:8px;padding:9px 12px;font-size:14px;width:100%;min-height:68px;resize:vertical;font-family:inherit;line-height:1.45}
.session-note-input:focus{outline:none;border-color:var(--accent)}

/* ── History Chart ── */
.hist-chart-wrap{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;overflow:hidden}
.hist-chart-hd{font-size:13px;font-weight:700;margin-bottom:10px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}
.chart-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-empty{font-size:13px;color:var(--txt3);text-align:center;padding:12px 0}

/* ── Warmup Quick Complete ── */
.sec-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-top:2px}
.sec-hd-row .sec-title{margin-bottom:0;padding-top:0}
.wu-all-btn{font-size:11px;background:var(--surf2);border:1px solid var(--border2);color:var(--green);border-radius:6px;padding:3px 8px;cursor:pointer;touch-action:manipulation;font-weight:600}
.wu-all-btn:active{opacity:.7}
.wu-all-btn.done-all{color:var(--txt3);border-color:var(--border);background:none}

/* ── Archive Day ── */
.save-day-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:2px 3px;opacity:.3;touch-action:manipulation;line-height:1;flex-shrink:0}
.save-day-btn.has-archive{opacity:1}
.archive-badge{display:inline-block;background:#1e1200;border:1px solid var(--accent-dim);color:var(--accent);font-size:10px;padding:2px 7px;border-radius:20px;margin-top:4px;margin-right:4px;font-weight:600;letter-spacing:.05em;cursor:pointer;touch-action:manipulation}
.archive-badge:active{opacity:.7}

/* ── Archive Modal ── */
.archive-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.archive-modal{background:var(--surf);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding:20px 16px 32px;box-sizing:border-box}
.archive-modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.archive-modal-title{font-size:15px;font-weight:700;color:var(--txt)}
.archive-modal-close{background:none;border:none;color:var(--txt3);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.archive-modal-date{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:12px}
.archive-modal-note{background:var(--surf2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--txt2);margin-bottom:14px;white-space:pre-wrap}
.archive-modal-note-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);font-weight:600;margin-bottom:6px}
.archive-checked-list{display:flex;flex-direction:column;gap:4px}
.archive-checked-item{font-size:13px;color:var(--txt2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.archive-checked-item.done{color:var(--txt)}
.archive-check-icon{font-size:14px;flex-shrink:0}
.archive-set-note{font-size:11px;color:var(--txt3);margin-left:22px;margin-top:2px}
.archive-delete-btn{display:block;width:100%;margin-top:18px;background:none;border:1px solid #5a1a1a;color:#f87171;border-radius:8px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.archive-delete-btn:active{opacity:.7}

/* ── Swap Session ── */
.swap-btns{display:flex;gap:2px;margin-left:4px;flex-shrink:0}
.swap-btn{background:var(--surf2);border:1px solid var(--border2);color:var(--txt3);border-radius:5px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.swap-btn:active{opacity:.7}
.swap-btn[disabled]{opacity:.2;pointer-events:none}

/* ── Mark Week Done ── */
.mark-done-btn{background:var(--surf2);border:1px solid var(--border2);color:var(--txt3);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;width:100%;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.mark-done-btn.activatable{border-color:var(--green);color:var(--green)}
.mark-done-btn.done-override{background:#0a1f0a;border-color:var(--green);color:var(--green)}
.mark-done-btn:active{opacity:.7}

/* ── Weight Edit Modal ── */
.weight-edit-sheet{background:var(--surf);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:440px;max-height:70vh;overflow-y:auto}
.weight-edit-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.weight-edit-row:last-of-type{border-bottom:none}
.weight-edit-label{font-size:13px;color:var(--txt2);width:65px;flex-shrink:0}
.weight-stepper{display:flex;align-items:center}
.stepper-btn{width:36px;height:36px;background:var(--surf2);border:1px solid var(--border2);color:var(--txt);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0}
.stepper-btn:first-child{border-radius:8px 0 0 8px}
.stepper-btn:last-child{border-radius:0 8px 8px 0}
.stepper-btn:active{background:var(--surf3)}
.stepper-val{background:var(--surf2);border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);border-left:none;border-right:none;color:var(--txt);font-size:16px;font-weight:700;width:60px;text-align:center;height:36px;padding:0;-moz-appearance:textfield}

.stepper-val::-webkit-outer-spin-button,.stepper-val::-webkit-inner-spin-button{-webkit-appearance:none}
.apply-future-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--border);margin-top:4px}
.af-toggle{width:40px;height:22px;background:var(--border2);border-radius:11px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;touch-action:manipulation}
.af-toggle.on{background:var(--accent)}
.af-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.af-toggle.on::after{transform:translateX(18px)}
.af-label{font-size:13px;color:var(--txt2)}
.wt-save-btn{background:var(--accent);color:#000;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;width:100%;cursor:pointer;margin-top:12px;touch-action:manipulation}
.wt-save-btn:active{opacity:.8}
.wt-cancel-btn{background:var(--surf2);color:var(--txt2);border:1px solid var(--border2);border-radius:10px;padding:10px;font-size:14px;width:100%;cursor:pointer;margin-top:8px;touch-action:manipulation}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const STATE_KEY = "c1_state";
const HIST_KEY  = "c1_history";

function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(s) {
  localStorage.setItem(STATE_KEY, JSON.stringify(s));
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch(e) { return []; }
}
function saveHistory(h) {
  localStorage.setItem(HIST_KEY, JSON.stringify(h));
}

let state = loadState();
if (state.currentWeek === undefined) state.currentWeek = 0;
if (!state.dates) state.dates = {};
if (!state.checked) state.checked = {};
if (!state.customWeights) state.customWeights = {};
if (!state.setNotes) state.setNotes = {};
if (!state.sessionNotes) state.sessionNotes = {};
if (!state.weekDoneOverride) state.weekDoneOverride = {};
if (!state.sessionOrder) state.sessionOrder = {};
if (!state.archivedSessions) state.archivedSessions = {};
// state.archivedSessions = { sessionId: [ {date, sessionNote, checked, setNotes, archivedAt}, ... ] }

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function getAllItems(session) {
  const items = [];
  for (const sec of session.sections) {
    for (const it of sec.items) {
      if (!it.sublabel) items.push(it);
    }
  }
  return items;
}

function sessionProgress(sessionId, session) {
  const items = getAllItems(session).filter(i => !i.info);
  if (!items.length) return {done:0, total:0, pct:0};
  const done = items.filter(i => state.checked[`${sessionId}:${i.id}`]).length;
  return {done, total:items.length, pct: Math.round(done/items.length*100)};
}

function weekDone(weekIdx) {
  if (state.weekDoneOverride && state.weekDoneOverride[weekIdx]) return true;
  const week = WEEKS[weekIdx];
  return week.sessions.every(s => {
    const p = sessionProgress(s.id, s);
    return p.total === 0 || p.pct === 100;
  });
}

function weekNaturallyDone(weekIdx) {
  const week = WEEKS[weekIdx];
  return week.sessions.every(s => {
    const p = sessionProgress(s.id, s);
    return p.total === 0 || p.pct === 100;
  });
}

// ═══════════════════════════════════════════════
//  RENDER WEEK GOALS
// ═══════════════════════════════════════════════
function renderGoals() {
  const week = WEEKS[state.currentWeek];
  const weekIdx = state.currentWeek;
  const wts = getWeekWeights(weekIdx);

  let html = '';
  html += `<div class="goals-banner">`;
  html += `<div class="goals-title">Week ${week.num} Goals</div>`;
  html += week.goals.map(g => `<div class="goals-text">• ${g}</div>`).join('');
  if (wts) {
    const isCustom = !!state.customWeights[weekIdx];
    html += `<div style="font-size:10px;color:var(--txt3);margin-top:8px;margin-bottom:4px">Tap a weight to edit · Tap <span style="color:var(--accent)">🧮</span> to calculate plates</div>`;
    html += `<div class="weights-grid">`;
    for (const [key, label] of [['squat','Squat'],['bench','Bench'],['deadlift','Deadlift'],['press','Press']]) {
      const val = wts[key];
      const cust = state.customWeights[weekIdx] && state.customWeights[weekIdx][key] !== undefined;
      html += `<div class="w-badge editable${cust?' custom-wt':''}" onclick="openWeightModal(${weekIdx})">
        <div class="w-lift">${label}</div>
        <div class="w-val">${val}</div>
        <div class="w-unit">lb${cust?' ✏':''}
          <button class="plate-calc-btn" onclick="event.stopPropagation();openPlateModal(${val})" title="Plate calc">🧮</button>
        </div>
      </div>`;
    }
    html += `</div>`;
  }
  // Mark Week Done button
  const natDone = weekNaturallyDone(weekIdx);
  const overrideDone = !!(state.weekDoneOverride && state.weekDoneOverride[weekIdx]);
  if (!natDone) {
    if (overrideDone) {
      html += `<button class="mark-done-btn done-override" onclick="toggleWeekDone(${weekIdx})">✓ Week Marked Done — tap to undo</button>`;
    } else {
      html += `<button class="mark-done-btn activatable" onclick="toggleWeekDone(${weekIdx})">☑ Mark Week Done</button>`;
    }
  }
  html += `</div>`;
  document.getElementById('week-goals').innerHTML = html;
}

// ═══════════════════════════════════════════════
//  RENDER SESSIONS
// ═══════════════════════════════════════════════
function getOrderedSessions(weekIdx) {
  const week = WEEKS[weekIdx];
  const order = state.sessionOrder && state.sessionOrder[weekIdx];
  if (!order) return [...week.sessions];
  return order.map(id => week.sessions.find(s => s.id === id)).filter(Boolean);
}

function renderSessions() {
  const weekIdx = state.currentWeek;
  const sessions = getOrderedSessions(weekIdx);
  let html = '';
  for (const session of sessions) {
    html += renderSessionCard(session, weekIdx);
  }
  document.getElementById('sessions-container').innerHTML = html;
}

function renderSessionCard(session, weekIdx) {
  if (weekIdx === undefined) weekIdx = state.currentWeek;
  const prog = sessionProgress(session.id, session);
  const isOpen = state.openSessions && state.openSessions[session.id];
  const dateVal = state.dates[session.id] || '';
  const archives = (state.archivedSessions && state.archivedSessions[session.id]) || [];
  const isCalis = session.type.includes('Calis');

  let typeColor = '#888';
  if (session.type.includes('Lift A')) typeColor = '#5b9bd5';
  else if (session.type.includes('Lift B')) typeColor = '#e8a020';
  else if (session.type.includes('Calis')) typeColor = '#a78bfa';
  else if (session.type.includes('Optional') || session.type.includes('Yoga')) typeColor = '#34d399';
  else if (session.type.includes('Check') || session.type.includes('Max')) typeColor = '#f87171';
  else if (session.type.includes('Deload') || session.type.includes('Walk') || session.type.includes('Light') || session.type.includes('Free') || session.type.includes('Long') || session.type.includes('Body')) typeColor = '#34d399';

  let badgeHtml = '';
  if (session.badge) {
    const bc = session.badgeType === 'redo' ? 'redo' : '';
    badgeHtml = `<div class="sh-badge ${bc}">${session.badge}</div>`;
  }
  // Show archived date badges (yellow, tappable)
  if (archives.length > 0) {
    badgeHtml += archives.map((a, i) => {
      const label = a.date ? a.date : `Archive ${i+1}`;
      return `<span class="archive-badge" onclick="event.stopPropagation();viewArchive('${session.id}',${i})">${label}</span>`;
    }).join('');
  }

  const pctHtml = prog.total > 0 ? `<span class="sh-pct">${prog.pct}%</span>` : '';

  // Swap buttons for calisthenics sessions
  let swapHtml = '';
  if (isCalis) {
    const sessions = getOrderedSessions(weekIdx);
    const idx = sessions.findIndex(s => s.id === session.id);
    const canUp = idx > 0;
    const canDown = idx < sessions.length - 1;
    swapHtml = `<div class="swap-btns" title="Move calisthenics day">
      <button class="swap-btn" onclick="event.stopPropagation();swapSession(${weekIdx},'${session.id}',-1)" ${canUp?'':'disabled'} title="Move earlier in week">↑</button>
      <button class="swap-btn" onclick="event.stopPropagation();swapSession(${weekIdx},'${session.id}',1)" ${canDown?'':'disabled'} title="Move later in week">↓</button>
    </div>`;
  }

  // Archive day button
  const saveBtn = `<button class="save-day-btn${archives.length>0?' has-archive':''}" onclick="event.stopPropagation();archiveDay(${weekIdx},'${session.id}')" title="Archive this day and reset">📌</button>`;

  let html = `
  <div class="session-card${isOpen ? ' open' : ''}" id="sc-${session.id}">
    <div class="session-head" onclick="toggleSession('${session.id}')">
      <div class="sh-left">
        <div class="sh-day">${session.day}</div>
        <div class="sh-title" style="color:${typeColor}">${session.type}</div>
        ${session.subtitle ? `<div class="sh-sub">${session.subtitle}</div>` : ''}
        ${badgeHtml}
      </div>
      <div class="sh-right">
        ${pctHtml}
        ${swapHtml}
        ${saveBtn}
        <span class="sh-chevron">⌄</span>
      </div>
    </div>
    <div class="prog-bar"><div class="prog-fill${prog.pct===100?' full':''}" style="width:${prog.pct}%"></div></div>
    <div class="session-body">
      <div class="date-row">
        <span class="date-lbl">Date</span>
        <input class="date-inp" type="date" value="${dateVal}" onchange="setDate('${session.id}', this.value)" />
      </div>
      ${renderSections(session)}
      <div class="session-note-wrap">
        <div class="session-note-label">Session Note</div>
        <textarea class="session-note-input" placeholder="How did it go? Any PRs, issues, energy level..."
          onchange="saveSessionNote('${session.id}',this.value)"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        >${state.sessionNotes[session.id] || ''}</textarea>
      </div>
    </div>
  </div>`;
  return html;
}

function renderSections(session) {
  let html = '';
  for (let i = 0; i < session.sections.length; i++) {
    html += renderSection(session.id, session.sections[i], i);
  }
  return html;
}

function renderSection(sessionId, sec, sectionIdx) {
  const isWarmup = sec.type === 'warmup';
  const isLift = sec.type === 'lift';
  let html = `<div class="section">`;

  // Section header with optional warmup quick-complete
  if (isWarmup) {
    const wuItems = sec.items.filter(i => !i.sublabel && !i.info);
    const allDone = wuItems.length > 0 && wuItems.every(i => state.checked[`${sessionId}:${i.id}`]);
    html += `<div class="sec-hd-row">
      <div class="sec-title ${sec.type||''}">${sec.title}</div>
      <button class="wu-all-btn${allDone?' done-all':''}" onclick="quickCompleteWarmup('${sessionId}',${sectionIdx})">${allDone ? '✓ Done' : '✓ All'}</button>
    </div>`;
  } else {
    html += `<div class="sec-title ${sec.type||''}">${sec.title}</div>`;
  }

  if (sec.personalNote) {
    html += `<div class="sec-note personal">📝 ${sec.personalNote}</div>`;
  }
  if (sec.note) {
    html += `<div class="sec-note accent">${sec.note}</div>`;
  }

  let lastWasWorkingSet = false;
  for (const item of sec.items) {
    if (item.sublabel) {
      lastWasWorkingSet = item.text.toLowerCase().includes('working');
      html += `<div class="sub-label">${item.text}</div>`;
      continue;
    }
    if (item.info) {
      html += `<div class="sec-note">${item.text}</div>`;
      continue;
    }
    const key = `${sessionId}:${item.id}`;
    const done = !!state.checked[key];
    const sn = state.setNotes[key] || {};
    const badgeId = `tb-${key.replace(/:/g,'-')}`;
    const isWorkingSet = isLift && lastWasWorkingSet;

    html += `
    <div class="ci${done?' done':''}" onclick="handleCiClick(event,'${sessionId}','${item.id}',${isWorkingSet})">
      <div class="ci-box">${done ? '✓' : ''}</div>
      <div class="ci-body">
        <div class="ci-text">${item.text}
          <span class="ci-expand-note" onclick="event.stopPropagation();expandSetNote('${sessionId}','${item.id}',this)" title="Add note">💬</span>
        </div>
        ${item.note ? `<div class="ci-note">${item.note}</div>` : ''}
        <div id="${badgeId}">${sn.tag ? `<span class="ci-tag-badge ${sn.tag}">${sn.tag}</span>` : ''}</div>
      </div>
    </div>`;
    // If note area already expanded, show it
    if (sn.tag || sn.text) {
      html += buildSetNoteArea(sessionId, item.id);
    }
  }
  html += `</div>`;
  return html;
}

function handleCiClick(event, sessionId, itemId, isWorkingSet) {
  // Don't trigger if clicking the expand note button or a child button
  if (event.target.tagName === 'BUTTON' || event.target.classList.contains('ci-expand-note')) return;
  toggleItem(sessionId, itemId);
  // After toggle: if it's now checked AND it's a working set, show rest timer
  if (isWorkingSet && state.checked[`${sessionId}:${itemId}`]) {
    showRestTimer();
  }
}
function expandSetNote(sessionId, itemId, btnEl) {
  const key = `${sessionId}:${itemId}`;
  const areaId = `sna-${key.replace(/:/g,'-')}`;
  // Toggle: if already showing, remove; else add
  const existing = document.getElementById(areaId);
  if (existing) {
    existing.remove();
  } else {
    const noteHtml = buildSetNoteArea(sessionId, itemId);
    btnEl.closest('.ci').insertAdjacentHTML('afterend', noteHtml);
  }
}

// ═══════════════════════════════════════════════
//  RENDER HEADER
// ═══════════════════════════════════════════════
function renderHeader() {
  const week = WEEKS[state.currentWeek];
  document.getElementById('week-label').textContent = week.label;
  document.getElementById('week-sub').textContent = week.phase;

  // Phase label
  const isTransition = week.num >= 10;
  document.getElementById('phase-label').textContent = isTransition ? 'Transition Block' : `${week.num} / 9 Weeks`;

  // Nav buttons
  document.getElementById('btn-prev').disabled = state.currentWeek === 0;
  document.getElementById('btn-next').disabled = state.currentWeek === WEEKS.length - 1;

  // Dots
  let dotsHtml = '';
  for (let i = 0; i < WEEKS.length; i++) {
    const w = WEEKS[i];
    const done = weekDone(i);
    const active = i === state.currentWeek;
    const trans = w.num >= 10;
    let cls = '';
    if (active) cls = 'active';
    else if (done) cls = 'done';
    else if (trans) cls = 'transition';
    dotsHtml += `<div class="dot ${cls}" onclick="goToWeek(${i})" title="${w.label}"></div>`;
  }
  document.getElementById('week-dots').innerHTML = dotsHtml;
}

// ═══════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════
function changeWeek(dir) {
  const next = state.currentWeek + dir;
  if (next < 0 || next >= WEEKS.length) return;
  state.currentWeek = next;
  saveState(state);
  renderAll();
  window.scrollTo(0, 0);
}

function goToWeek(idx) {
  state.currentWeek = idx;
  saveState(state);
  renderAll();
  window.scrollTo(0, 0);
}

function toggleSession(sessionId) {
  if (!state.openSessions) state.openSessions = {};
  state.openSessions[sessionId] = !state.openSessions[sessionId];
  saveState(state);
  const card = document.getElementById(`sc-${sessionId}`);
  if (card) {
    card.classList.toggle('open', !!state.openSessions[sessionId]);
  }
}

function toggleItem(sessionId, itemId) {
  const key = `${sessionId}:${itemId}`;
  state.checked[key] = !state.checked[key];
  saveState(state);
  // Find the session for history logging
  const week = WEEKS[state.currentWeek];
  const session = week.sessions.find(s => s.id === sessionId);
  if (session) {
    logHistory(sessionId, session);
    updateSessionCard(sessionId, session);
  }
}

function setDate(sessionId, value) {
  state.dates[sessionId] = value;
  saveState(state);
  const week = WEEKS[state.currentWeek];
  const session = week.sessions.find(s => s.id === sessionId);
  if (session) logHistory(sessionId, session);
}

function updateSessionCard(sessionId, session) {
  const prog = sessionProgress(sessionId, session);
  // Update progress bar
  const card = document.getElementById(`sc-${sessionId}`);
  if (!card) return;
  const fill = card.querySelector('.prog-fill');
  if (fill) {
    fill.style.width = prog.pct + '%';
    fill.classList.toggle('full', prog.pct === 100);
  }
  // Update pct text
  const pctEl = card.querySelector('.sh-pct');
  if (pctEl && prog.total > 0) pctEl.textContent = prog.pct + '%';
  // Update dot
  renderHeader();
  // Update individual check item
  const items = getAllItems(session);
  // Re-render just the open card body for efficiency - but for simplicity re-render sections
  const body = card.querySelector('.session-body');
  if (body && card.classList.contains('open')) {
    const dateInp = body.querySelector('.date-inp');
    const dateVal = dateInp ? dateInp.value : '';
    // Preserve date and session note
    body.innerHTML = `
      <div class="date-row">
        <span class="date-lbl">Date</span>
        <input class="date-inp" type="date" value="${dateVal}" onchange="setDate('${sessionId}', this.value)" />
      </div>
      ${renderSections(session)}
      <div class="session-note-wrap">
        <div class="session-note-label">Session Note</div>
        <textarea class="session-note-input" placeholder="How did it go? Any PRs, issues, energy level..."
          onchange="saveSessionNote('${sessionId}',this.value)"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
        >${state.sessionNotes[sessionId] || ''}</textarea>
      </div>`;
  }
}

// ═══════════════════════════════════════════════
//  HISTORY LOGGING
// ═══════════════════════════════════════════════
function logHistory(sessionId, session) {
  const prog = sessionProgress(sessionId, session);
  if (prog.done === 0) return;
  const date = state.dates[sessionId] || '';
  let history = loadHistory();
  const existIdx = history.findIndex(h => h.id === sessionId);
  const weekIdx = state.currentWeek;
  const wts = getWeekWeights(weekIdx);
  const entry = {
    id: sessionId,
    date,
    weekNum: WEEKS[weekIdx].num,
    day: session.day,
    type: session.type,
    subtitle: session.subtitle || '',
    badge: session.badge || '',
    done: prog.done,
    total: prog.total,
    pct: prog.pct,
    weights: wts || null,
    updatedAt: new Date().toISOString()
  };
  if (existIdx >= 0) history[existIdx] = entry;
  else history.unshift(entry);
  // Keep last 200
  if (history.length > 200) history = history.slice(0, 200);
  saveHistory(history);
}

// ═══════════════════════════════════════════════
//  RENDER HISTORY TAB
// ═══════════════════════════════════════════════
function renderHistory() {
  const history = loadHistory();
  const cont = document.getElementById('history-content');
  if (!history.length) {
    cont.innerHTML = `<div class="hist-empty">
      <div class="hist-empty-icon">📋</div>
      <div>No workouts logged yet.</div>
      <div style="margin-top:8px;font-size:13px;color:#555">Complete exercises and add a date to log your sessions.</div>
    </div>`;
    return;
  }
  let html = renderLiftChart(history);
  html += `<button class="hist-clear-btn" onclick="clearHistory()">Clear History</button>`;
  for (const h of history) {
    const dateStr = h.date ? formatDate(h.date) : 'No date set';
    const pct = h.pct || 0;
    html += `<div class="hist-card">
      <div class="hist-date">Week ${h.weekNum} · ${h.day}${h.badge ? ' · ' + h.badge : ''} · ${dateStr}</div>
      <div class="hist-title">${h.type}</div>
      <div class="hist-sub">${h.subtitle}</div>
      <div class="hist-bar"><div class="hist-fill" style="width:${pct}%"></div></div>
      <div class="hist-stat">${h.done} / ${h.total} items · ${pct}% complete</div>
    </div>`;
  }
  cont.innerHTML = html;
}

function formatDate(d) {
  if (!d) return '';
  try {
    const parts = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(parts[1])-1]} ${parseInt(parts[2])}, ${parts[0]}`;
  } catch(e) { return d; }
}

function clearHistory() {
  if (confirm('Clear all workout history? This cannot be undone.')) {
    saveHistory([]);
    renderHistory();
  }
}

let currentTab = 'workout';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');

  const views = ['workout','history','calis','recovery'];
  for (const v of views) {
    const el = document.getElementById(`view-${v}`);
    if (el) {
      el.style.display = (v === tab) ? '' : 'none';
      el.classList.toggle('active', v === tab);
    }
  }
  document.getElementById('header').style.display = tab === 'workout' ? '' : 'none';

  if (tab === 'history') renderHistory();
  if (tab === 'recovery') renderRecovery();
  if (tab === 'calis') renderCalis();
}

//  WEIGHT HELPERS
// ═══════════════════════════════════════════════
function getWeekWeights(weekIdx) {
  const base = WEEKS[weekIdx].weights || null;
  if (!base) return null;
  const custom = state.customWeights[weekIdx];
  if (custom) return Object.assign({}, base, custom);
  return base;
}

let _weApplyFuture = false;

function openWeightModal(weekIdx) {
  _weEditIdx = weekIdx;

          <button class="stepper-btn" onclick="stepWeight('${k}',-5)">−</button>
          <input class="stepper-val" type="number" id="wev-${k}" value="${val}" step="5" min="0" max="999" />
          <button class="stepper-btn" onclick="stepWeight('${k}',5)">+</button>
        </div>
        <span style="font-size:11px;color:var(--txt3);margin-left:8px">lb</span>
        <span style="font-size:10px;color:var(--txt4);margin-left:4px">default ${defaults[k]}</span>
      </div>`;
    }
  }
  document.getElementById('we-fields').innerHTML = html;
  document.getElementById('weight-modal').classList.add('open');
}
function stepWeight(key, delta) {
  const inp = document.getElementById(`wev-${key}`);
  if (!inp) return;
  let v = parseInt(inp.value) || 0;
  v = Math.max(0, v + delta);
  v = Math.round(v / 5) * 5;
  inp.value = v;
}
function toggleAF() {
  _weApplyFuture = !_weApplyFuture;
  document.getElementById('af-toggle').classList.toggle('on', _weApplyFuture);
}
function saveWeightEdit() {
  if (_weEditIdx < 0) return;
  const defaults = WEEKS[_weEditIdx].weights;
  const newWts = {};
  for (const k of LIFT_KEYS) {
    const inp = document.getElementById(`wev-${k}`);
    if (inp) newWts[k] = parseInt(inp.value) || defaults[k];
  }
  // Apply to this week
  state.customWeights[_weEditIdx] = newWts;
  // Optionally apply to future weeks
  if (_weApplyFuture) {
    for (let i = _weEditIdx + 1; i < WEEKS.length; i++) {
      const fw = WEEKS[i].weights;
      if (!fw) continue;
      const futureDiff = {};
      for (const k of LIFT_KEYS) {
        if (fw[k] !== undefined) {
          const delta = newWts[k] - (WEEKS[_weEditIdx].weights[k] || 0);
          futureDiff[k] = Math.max(0, (fw[k] || 0) + delta);
        }
      }
      state.customWeights[i] = futureDiff;
    }
  }
  saveState(state);
  closeWeightModal();
  renderAll();
}
function closeWeightModal(e) {
  if (e && e.target !== document.getElementById('weight-modal')) return;
  document.getElementById('weight-modal').classList.remove('open');
}

// ═══════════════════════════════════════════════
//  PLATE CALCULATOR
// ═══════════════════════════════════════════════
const PLATE_SIZES = [45,35,25,10,5,2.5];
const PLATE_CLASSES = {45:'p45',35:'p35',25:'p25',10:'p10',5:'p5',2.5:'p2'};
const BAR_WEIGHT = 45;

function openPlateModal(targetWt) {
  document.getElementById('plate-input').value = targetWt || 135;
  document.getElementById('plate-modal').classList.add('open');
  calcPlates();
}
function closePlateModal(e) {
  if (e && e.target !== document.getElementById('plate-modal')) return;
  document.getElementById('plate-modal').classList.remove('open');
}
function calcPlates() {
  const total = parseFloat(document.getElementById('plate-input').value) || 0;
  const perSide = (total - BAR_WEIGHT) / 2;
  let remaining = perSide;
  const plates = [];
  if (remaining > 0) {
    for (const p of PLATE_SIZES) {
      while (remaining >= p - 0.01) {
        plates.push(p);
        remaining -= p;
        remaining = Math.round(remaining * 100) / 100;
      }
    }
  }
  let chipsHtml = '';
  if (plates.length === 0) {
    chipsHtml = `<span style="color:var(--txt3);font-size:13px">Bar only (${BAR_WEIGHT} lb)</span>`;
  } else {
    chipsHtml = plates.map(p => `<div class="plate-chip ${PLATE_CLASSES[p]||'p2'}">${p}</div>`).join('');
  }
  document.getElementById('plate-chips').innerHTML = chipsHtml;
  const actualTotal = BAR_WEIGHT + plates.reduce((a,b)=>a+b,0)*2;
  document.getElementById('plate-total-txt').innerHTML =
    `<span style="color:var(--txt2)">Bar ${BAR_WEIGHT} lb + ${plates.reduce((a,b)=>a+b,0)} × 2 = </span><strong style="color:var(--txt)">${actualTotal} lb</strong>`;
}

// ═══════════════════════════════════════════════
//  REST TIMER
// ═══════════════════════════════════════════════
let _rtSecs = 120, _rtRemaining = 120, _rtRunning = false, _rtInterval = null;

function setRestPreset(secs) {
  _rtSecs = secs;
  _rtRemaining = secs;
  _rtRunning = false;
  if (_rtInterval) { clearInterval(_rtInterval); _rtInterval = null; }
  document.querySelectorAll('.rt-preset').forEach(b => b.classList.remove('sel'));
  const id = `rtp-${secs}`;
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('sel');
  updateTimerDisplay();
  document.getElementById('rt-playbtn').textContent = '▶';
  document.getElementById('rt-display').classList.remove('done');
}
function toggleRestTimer() {
  if (_rtRunning) {
    clearInterval(_rtInterval);
    _rtInterval = null;
    _rtRunning = false;
    document.getElementById('rt-playbtn').textContent = '▶';
  } else {
    if (_rtRemaining <= 0) { _rtRemaining = _rtSecs; }
    _rtRunning = true;
    document.getElementById('rt-playbtn').textContent = '⏸';
    document.getElementById('rt-display').classList.remove('done');
    _rtInterval = setInterval(() => {
      _rtRemaining--;
      updateTimerDisplay();
      if (_rtRemaining <= 0) {
        clearInterval(_rtInterval);
        _rtInterval = null;
        _rtRunning = false;
        document.getElementById('rt-playbtn').textContent = '▶';
        document.getElementById('rt-display').classList.add('done');
        try { const v = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAA'); v.play(); } catch(e) {}
      }
    }, 1000);
  }
}
function updateTimerDisplay() {
  const m = Math.floor(_rtRemaining / 60);
  const s = _rtRemaining % 60;
  document.getElementById('rt-display').textContent = `${m}:${String(s).padStart(2,'0')}`;
}
function showRestTimer() {
  document.getElementById('rest-timer').classList.add('visible');
  setRestPreset(_rtSecs); // reset + auto-start
  _rtRemaining = _rtSecs;
  toggleRestTimer();
}
function hideRestTimer() {
  if (_rtInterval) { clearInterval(_rtInterval); _rtInterval = null; }
  _rtRunning = false;
  document.getElementById('rest-timer').classList.remove('visible');
}

function toggleSetNote(sessionId, itemId, tag) {
  const key = `${sessionId}:${itemId}`;
  if (!state.setNotes[key]) state.setNotes[key] = {};
  if (state.setNotes[key].tag === tag) {
    state.setNotes[key].tag = null;
  } else {
    state.setNotes[key].tag = tag;
  }
  saveState(state);
  // refresh the note area DOM
  const noteArea = document.getElementById(`sna-${key.replace(/:/g,'-')}`);
  if (noteArea) noteArea.outerHTML = buildSetNoteArea(sessionId, itemId);

}
function saveSetNoteText(sessionId, itemId, value) {
  const key = `${sessionId}:${itemId}`;
  if (!state.setNotes[key]) state.setNotes[key] = {};
  state.setNotes[key].text = value;
  saveState(state);
}
function buildSetNoteArea(sessionId, itemId) {
  const key = `${sessionId}:${itemId}`;
  const note = state.setNotes[key] || {};
  const areaId = `sna-${key.replace(/:/g,'-')}`;
  const tags = ['easy','good','tough','failed'];
  const tagBtns = tags.map(t =>
    `<button class="set-tag ${t}${note.tag===t?' sel':''}" onclick="toggleSetNote('${sessionId}','${itemId}','${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`
  ).join('');
  return `<div class="set-note-area" id="${areaId}">
    <div class="tag-row">${tagBtns}</div>
    <textarea class="set-note-txt" placeholder="Note (optional)..." rows="1"
      onchange="saveSetNoteText('${sessionId}','${itemId}',this.value)"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
    >${note.text || ''}</textarea>
  </div>`;
}
function updateTagBadge(sessionId, itemId) {
  const key = `${sessionId}:${itemId}`;
  const note = state.setNotes[key] || {};
  const badge = document.getElementById(`tb-${key.replace(/:/g,'-')}`);
  if (badge) {
    if (note.tag) {
      badge.innerHTML = `<span class="ci-tag-badge ${note.tag}">${note.tag}</span>`;
    } else {
      badge.innerHTML = '';
    }
  }
}

// ═══════════════════════════════════════════════
//  WARMUP QUICK-COMPLETE
// ═══════════════════════════════════════════════
function quickCompleteWarmup(sessionId, sectionIdx) {
  const week = WEEKS[state.currentWeek];
  const session = week.sessions.find(s => s.id === sessionId);
  if (!session) return;
  const sec = session.sections[sectionIdx];
  if (!sec) return;
  const items = sec.items.filter(i => !i.sublabel && !i.info);
  const allDone = items.every(i => state.checked[`${sessionId}:${i.id}`]);
  for (const item of items) {
    state.checked[`${sessionId}:${item.id}`] = !allDone;
  }
  saveState(state);
  logHistory(sessionId, session);
  updateSessionCard(sessionId, session);
}

const DOW_MAP = {1:'Monday',3:'Wednesday',5:'Friday'}; // JS getDay: 0=Sun,1=Mon,...
function renderTodayBanner() {
  const slot = document.getElementById('today-banner-slot');
  if (!slot) return;
  const dow = new Date().getDay();
  const dayName = DOW_MAP[dow];
  if (!dayName) { slot.innerHTML = ''; return; }
  // Find the first session of that day type in current week
  const week = WEEKS[state.currentWeek];
  const session = week.sessions.find(s => s.day === dayName);

  const icon = dow===1 ? '💪' : dow===3 ? '🤸' : '🏋️';
  slot.innerHTML = `<div class="today-banner" onclick="scrollToSession('${session.id}')">
    <div class="today-icon">${icon}</div>

      <div class="today-label">Today · ${dayName}</div>
      <div class="today-session">${session.type} — ${session.subtitle || ''}</div>

}
function scrollToSession(sessionId) {

function renderCalis() {
  const cont = document.getElementById('calis-content');
  // Gather all calisthenics sessions across all weeks
  const entries = [];
  for (const week of WEEKS) {
    for (const session of week.sessions) {
      if (session.type.toLowerCase().includes('cali') || session.subtitle && session.subtitle.toLowerCase().includes('cali') || session.type === 'Day 6' || (session.sections && session.sections.some(s => s.title && s.title.toLowerCase().includes('cali')))) {
        entries.push({week, session});
      }
    }
  }
  if (!entries.length) {
    cont.innerHTML = `<div class="hist-empty"><div class="hist-empty-icon">🤸</div><div>No calisthenics sessions found.</div></div>`;
    return;
  }
  let html = `<div style="margin-bottom:12px;font-size:13px;color:var(--txt2)">All calisthenics days across the 12 weeks. Tap to view any session.</div>`;
  let lastWeek = -1;
  for (const {week, session} of entries) {
    if (week.num !== lastWeek) {
      html += `<div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);font-weight:600;margin:12px 0 6px">${week.label} — ${week.phase}</div>`;
      lastWeek = week.num;
    }
    const prog = sessionProgress(session.id, session);
    const pct = prog.total > 0 ? prog.pct : null;
    html += `<div class="session-card${state.openSessions && state.openSessions[session.id+'-calis'] ? ' open' : ''}" id="csc-${session.id}" style="margin-bottom:8px">
      <div class="session-head" onclick="toggleCalisSession('${session.id}','${week.num - 1}')">
        <div class="sh-left">
          <div class="sh-day">${session.day}</div>
          <div class="sh-title" style="color:var(--purple)">${session.type}</div>
          ${session.subtitle ? `<div class="sh-sub">${session.subtitle}</div>` : ''}
        </div>
        <div class="sh-right">
          ${pct !== null ? `<span class="sh-pct">${pct}%</span>` : ''}
          <span class="sh-chevron">⌄</span>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill${prog.pct===100?' full':''}" style="width:${prog.pct}%"></div></div>
      <div class="session-body">
        <div class="date-row">
          <span class="date-lbl">Date</span>
          <input class="date-inp" type="date" value="${state.dates[session.id]||''}" onchange="setDate('${session.id}', this.value)" />
        </div>
        ${renderSections(session)}
      </div>
    </div>`;
  }
  cont.innerHTML = html;
}
function toggleCalisSession(sessionId, weekIdx) {

// ═══════════════════════════════════════════════
//  HISTORY SPARKLINES
// ═══════════════════════════════════════════════
function renderLiftChart(history) {
  const liftColors = {squat:'#e8a020', bench:'#5b9bd5', deadlift:'#f87171', press:'#a78bfa'};
  const liftLabels = {squat:'Squat', bench:'Bench', deadlift:'Deadlift', press:'Press'};

  // Build data points per lift from history entries that have weight data
  const points = {squat:[], bench:[], deadlift:[], press:[]};
  const seen = new Set();
  // history is newest-first, so reverse for chronological
  const chrono = [...history].reverse();
  for (const h of chrono) {
    if (!h.weekNum || !h.weights) continue;
    const wk = h.weekNum;
    for (const k of ['squat','bench','deadlift','press']) {
      if (h.weights[k]) {
        points[k].push({week: wk, val: h.weights[k]});
      }
    }
  }
  // Deduplicate by week — keep last
  for (const k of Object.keys(points)) {
    const map = new Map();
    for (const p of points[k]) map.set(p.week, p.val);
    points[k] = Array.from(map.entries()).map(([week,val]) => ({week,val}));
  }

  const anyData = Object.values(points).some(arr => arr.length > 1);
  if (!anyData) return '';

  const W = 320, H = 80;
  const allWeeks = [...new Set(Object.values(points).flat().map(p=>p.week))].sort((a,b)=>a-b);
  if (allWeeks.length < 2) return '';

  const minW = allWeeks[0], maxW = allWeeks[allWeeks.length-1];
  const xScale = w => ((w - minW) / (maxW - minW || 1)) * (W - 20) + 10;

  let svgPaths = '';
  for (const k of ['squat','deadlift','bench','press']) {
    const pts = points[k];
    if (pts.length < 2) continue;
    const vals = pts.map(p => p.val);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const yScale = v => H - 8 - ((v - minV) / (maxV - minV || 1)) * (H - 16);
    const d = pts.map((p,i) => `${i===0?'M':'L'}${xScale(p.week).toFixed(1)},${yScale(p.val).toFixed(1)}`).join(' ');
    svgPaths += `<path d="${d}" fill="none" stroke="${liftColors[k]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    // End dot
    const last = pts[pts.length-1];
    svgPaths += `<circle cx="${xScale(last.week).toFixed(1)}" cy="${yScale(last.val).toFixed(1)}" r="3" fill="${liftColors[k]}"/>`;
  }

  const legendItems = ['squat','deadlift','bench','press']
    .filter(k => points[k].length >= 2)
    .map(k => `<div class="chart-legend-item"><div class="chart-dot" style="background:${liftColors[k]}"></div>${liftLabels[k]}</div>`)
    .join('');

  return `<div class="hist-chart-wrap">
    <div class="hist-chart-hd">💹 Lift Progress</div>
    <div class="chart-legend">${legendItems}</div>
    <div class="chart-svg-container">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="overflow:visible">${svgPaths}</svg>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  ARCHIVE DAY
// ═══════════════════════════════════════════════
function archiveDay(weekIdx, sessionId) {
  const week = WEEKS[weekIdx];
  const session = week.sessions.find(s => s.id === sessionId);
  if (!session) return;

  // Snapshot current session data
  const allItems = getAllItems(session);
  const checkedSnap = {};
  const setNotesSnap = {};
  allItems.forEach(item => {
    const key = `${sessionId}:${item.id}`;
    if (state.checked[key]) checkedSnap[key] = true;
    if (state.setNotes[key]) setNotesSnap[key] = JSON.parse(JSON.stringify(state.setNotes[key]));
  });

  const doneCount = Object.keys(checkedSnap).length;
  const totalCount = allItems.filter(i => !i.info).length;

  const archive = {
    date: state.dates[sessionId] || new Date().toLocaleDateString('en-US', {month:'numeric',day:'numeric',year:'2-digit'}),
    sessionNote: state.sessionNotes[sessionId] || '',
    checked: checkedSnap,
    setNotes: setNotesSnap,
    doneCount,
    totalCount,
    archivedAt: Date.now(),
    sessionItems: allItems.filter(i => !i.info && !i.sublabel).map(i => ({id: i.id, text: i.text}))
  };

  if (!state.archivedSessions) state.archivedSessions = {};
  if (!state.archivedSessions[sessionId]) state.archivedSessions[sessionId] = [];
  state.archivedSessions[sessionId].push(archive);

  // Reset the session
  allItems.forEach(item => {
    const key = `${sessionId}:${item.id}`;
    delete state.checked[key];
    delete state.setNotes[key];
  });
  delete state.dates[sessionId];
  delete state.sessionNotes[sessionId];

  saveState(state);
  renderAll();
}

function viewArchive(sessionId, archiveIdx) {
  if (!state.archivedSessions || !state.archivedSessions[sessionId]) return;
  const archive = state.archivedSessions[sessionId][archiveIdx];
  if (!archive) return;

  const pct = archive.totalCount > 0 ? Math.round(archive.doneCount / archive.totalCount * 100) : 0;

  let itemsHtml = '';
  if (archive.sessionItems && archive.sessionItems.length > 0) {
    itemsHtml = `<div class="archive-modal-note-lbl" style="margin-bottom:8px">Exercises</div>
    <div class="archive-checked-list">` +
    archive.sessionItems.map(item => {
      const key = `${sessionId}:${item.id}`;
      const done = !!archive.checked[key];
      const sn = archive.setNotes[key];
      let snHtml = '';
      if (sn && sn.tag) snHtml = `<div class="archive-set-note">${sn.tag}</div>`;
      return `<div class="archive-checked-item${done?' done':''}">
        <span class="archive-check-icon">${done ? '✅' : '⬜'}</span>
        <span>${item.text}</span>
      </div>${snHtml}`;
    }).join('') + `</div>`;
  }

  const noteHtml = archive.sessionNote
    ? `<div class="archive-modal-note-lbl">Session Note</div>
       <div class="archive-modal-note">${archive.sessionNote}</div>`
    : '';

  const modalHtml = `<div class="archive-modal-overlay" onclick="closeArchiveModal(event)">
    <div class="archive-modal" onclick="event.stopPropagation()">
      <div class="archive-modal-hd">
        <div class="archive-modal-title">📌 Archived Day</div>
        <button class="archive-modal-close" onclick="closeArchiveModal()">×</button>
      </div>
      <div class="archive-modal-date">${archive.date} &nbsp;·&nbsp; ${pct}% complete</div>
      ${noteHtml}
      ${itemsHtml}
      <button class="archive-delete-btn" onclick="deleteArchive('${sessionId}',${archiveIdx})">Delete this archive</button>
    </div>
  </div>`;

  const el = document.createElement('div');
  el.id = 'archive-modal-root';
  el.innerHTML = modalHtml;
  document.body.appendChild(el);
}

function closeArchiveModal(e) {
  if (e && e.target !== e.currentTarget) return;
  const el = document.getElementById('archive-modal-root');
  if (el) el.remove();
}

function deleteArchive(sessionId, archiveIdx) {
  if (!state.archivedSessions || !state.archivedSessions[sessionId]) return;
  state.archivedSessions[sessionId].splice(archiveIdx, 1);
  if (state.archivedSessions[sessionId].length === 0) delete state.archivedSessions[sessionId];
  saveState(state);
  closeArchiveModal();
  renderAll();
}

function _legacyGoToSavedDay() {
  // kept as stub for any old saved state references
  return;
  }, 120);
}

// ═══════════════════════════════════════════════
//  SWAP CALISTHENICS DAY
// ═══════════════════════════════════════════════
function swapSession(weekIdx, sessionId, dir) {
  const sessions = getOrderedSessions(weekIdx);
  const ids = sessions.map(s => s.id);
  const idx = ids.indexOf(sessionId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= ids.length) return;
  // Swap positions
  const tmp = ids[idx];
  ids[idx] = ids[newIdx];
  ids[newIdx] = tmp;
  if (!state.sessionOrder) state.sessionOrder = {};
  state.sessionOrder[weekIdx] = ids;
  saveState(state);
  renderAll();
}

// ═══════════════════════════════════════════════
//  MARK WEEK DONE
// ═══════════════════════════════════════════════
function toggleWeekDone(weekIdx) {
  if (!state.weekDoneOverride) state.weekDoneOverride = {};
  state.weekDoneOverride[weekIdx] = !state.weekDoneOverride[weekIdx];
  saveState(state);
  renderHeader();
  renderGoals();
}
